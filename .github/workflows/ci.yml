name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: joxera_test
          POSTGRES_USER: joxera
          POSTGRES_PASSWORD: joxera
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U joxera -d joxera_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Run migrations
        env:
          DJANGO_ENV: test
          DEBUG: "True"
          SECRET_KEY: test-secret-key
          POSTGRES_DB: joxera_test
          POSTGRES_USER: joxera
          POSTGRES_PASSWORD: joxera
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
          GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
        run: python manage.py migrate --noinput

      - name: Pytest
        env:
          DJANGO_ENV: test
          DEBUG: "True"
          SECRET_KEY: test-secret-key
          POSTGRES_DB: joxera_test
          POSTGRES_USER: joxera
          POSTGRES_PASSWORD: joxera
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgdal.so
          GEOS_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/libgeos_c.so
          ALLOW_KYC_SIMULATION: "True"
        run: pytest --cov=. --cov-report=term-missing

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck & build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend production image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: false
          tags: joxera-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend production image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: false
          tags: joxera-frontend:ci
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        working-directory: docker
        run: |
          cp .env.prod.example .env.prod || true
          echo "SECRET_KEY=ci-e2e-secret-key" >> .env.prod
          echo "POSTGRES_PASSWORD=joxera" >> .env.prod
          echo "ALLOW_KYC_SIMULATION=True" >> .env.prod
          echo "SECURE_SSL_REDIRECT=False" >> .env.prod
          docker compose -f docker-compose.yml up -d --build db redis backend celery
          sleep 15
          docker compose -f docker-compose.yml exec -T backend python manage.py migrate --noinput

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend & Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start frontend dev server
        run: npm run dev -- --host 0.0.0.0 --port 5173 &
        env:
          VITE_API_URL: http://localhost:8000/api

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8000/api/health/ http://localhost:5173 --timeout 120000

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8000/api
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop stack
        if: always()
        working-directory: docker
        run: docker compose -f docker-compose.yml down -v
