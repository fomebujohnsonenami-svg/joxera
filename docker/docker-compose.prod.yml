services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-joxera}
      POSTGRES_USER: ${POSTGRES_USER:-joxera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-joxera} -d ${POSTGRES_DB:-joxera}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - joxera

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - joxera

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: always
    environment:
      DJANGO_ENV: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,backend}
      POSTGRES_DB: ${POSTGRES_DB:-joxera}
      POSTGRES_USER: ${POSTGRES_USER:-joxera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      THROTTLE_ANON: ${THROTTLE_ANON:-100/hour}
      THROTTLE_USER: ${THROTTLE_USER:-1000/hour}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      DLOCAL_API_KEY: ${DLOCAL_API_KEY:-}
      DLOCAL_API_SECRET: ${DLOCAL_API_SECRET:-}
      DLOCAL_WEBHOOK_SECRET: ${DLOCAL_WEBHOOK_SECRET:-}
      PERSONA_WEBHOOK_SECRET: ${PERSONA_WEBHOOK_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ALLOW_KYC_SIMULATION: ${ALLOW_KYC_SIMULATION:-False}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8000",
        "--workers",
        "4",
        "--timeout",
        "120",
        "--access-logfile",
        "-",
      ]
    networks:
      - joxera

  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: always
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      DJANGO_ENV: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      POSTGRES_DB: ${POSTGRES_DB:-joxera}
      POSTGRES_USER: ${POSTGRES_USER:-joxera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - joxera

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - joxera

volumes:
  postgres_data:
  redis_data:

networks:
  joxera:
    driver: bridge
